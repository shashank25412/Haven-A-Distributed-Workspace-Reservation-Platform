# -----------------------------------------------------------------------------
# Haven Local Runtime
#
# Runs the current Haven API foundation service.
#
# Couchbase, Redis, and Kafka are intentionally excluded until the application
# has real adapters and readiness policies for those dependencies.
# -----------------------------------------------------------------------------

services:
  haven-api:
    build:
      context: .
      dockerfile: Dockerfile

    image: haven-api:foundation

    container_name: haven-api

    environment:
      HVN_HTTP_ADDRESS: "${HVN_HTTP_ADDRESS:-0.0.0.0}"
      HVN_HTTP_PORT: "${HVN_HTTP_PORT:-8080}"
      HVN_HTTP_THREADS: "${HVN_HTTP_THREADS:-1}"
      HVN_LOG_LEVEL: "${HVN_LOG_LEVEL:-info}"

    ports:
      - "${HVN_HTTP_PORT:-8080}:${HVN_HTTP_PORT:-8080}"

    init: true

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "http://127.0.0.1:8080/health/live"
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

    stop_grace_period: 10s